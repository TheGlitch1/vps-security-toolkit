# Fail2Ban action for repeat offenders - adds to permanent blacklist
# File: /etc/fail2ban/action.d/ipset-repeat-offender.conf
#
# This action adds IPs to permanent blacklist ONLY if they've been banned
# multiple times (repeat offenders). First-time offenders get temporary bans.
#
# Requires: fail2ban >= 0.10 with database support
#
# Installation:
#   sudo cp ipset-repeat-offender.conf /etc/fail2ban/action.d/
#   sudo chmod 644 /etc/fail2ban/action.d/ipset-repeat-offender.conf

[Definition]

# Option: actionstart
# Notes.: Command executed once at the start of Fail2Ban.
#
actionstart =

# Option: actionstop
# Notes.: Command executed once at the end of Fail2Ban
#
actionstop =

# Option: actioncheck
# Notes.: Command executed once before each actionban command
#
actioncheck =

# Option: actionban
# Notes.: Command executed when banning an IP.
#         Only adds to permanent list if IP has been banned before
# Tags: See jail.conf(5) man page
# Values: CMD
#
actionban = ban_count=$(fail2ban-client get <name> banip <ip> 2>/dev/null | grep -c "^" || echo 0)
if [ "$ban_count" -ge <repeat_threshold> ]; then
ipset -exist add <ipmset> <ip>
logger -t fail2ban-repeat "REPEAT OFFENDER <ip> added to permanent blacklist - Ban count: $ban_count"
echo "REPEAT OFFENDER: <ip> banned $ban_count times - PERMANENTLY BLOCKED" | mail -s "Permanent Ban: <ip>" <destemail>
else
logger -t fail2ban-repeat "IP <ip> banned (count: $ban_count, threshold: <repeat_threshold>)"
fi

# Option: actionunban
# Notes.: Don't remove from permanent blacklist
#
actionunban =

[Init]

# Name of the IPSet list
ipmset = blacklist-permanent

# Number of bans before adding to permanent list (2 = second ban, 3 = third ban, etc.)
repeat_threshold = 2

# Default jail name
name = default

# Email for repeat offender alerts
destemail = root@localhost
