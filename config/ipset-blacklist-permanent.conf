# Fail2Ban action to add IPs to permanent IPSet blacklist
# File: /etc/fail2ban/action.d/ipset-blacklist-permanent.conf
#
# This action adds banned IPs to a permanent IPSet list that persists
# across reboots and is never automatically cleared by fail2ban.
#
# Installation:
#   sudo cp ipset-blacklist-permanent.conf /etc/fail2ban/action.d/
#   sudo chmod 644 /etc/fail2ban/action.d/ipset-blacklist-permanent.conf

[Definition]

# Option: actionstart
# Notes.: Command executed once at the start of Fail2Ban.
# Values: CMD
#
actionstart = # IPSet already exists, no need to create

# Option: actionstop
# Notes.: Command executed once at the end of Fail2Ban
# Values: CMD
#
actionstop = # Never destroy the permanent blacklist

# Option: actioncheck
# Notes.: Command executed once before each actionban command
# Values: CMD
#
actioncheck =

# Option: actionban
# Notes.: Command executed when banning an IP.
#         Add IP to permanent blacklist WITHOUT timeout
# Tags: See jail.conf(5) man page
# Values: CMD
#
actionban = ipset -exist add <ipmset> <ip>
logger -t fail2ban-permanent "Added <ip> to permanent blacklist (<ipmset>) - Jail: <name>"

# Option: actionunban
# Notes.: Command executed when unbanning an IP.
#         We DON'T remove from permanent list (that's the point!)
# Tags: See jail.conf(5) man page
# Values: CMD
#
actionunban = # Keep IP in permanent blacklist - manual removal only

[Init]

# Name of the IPSet list
ipmset = blacklist-permanent

# Default name for the jail
name = default
