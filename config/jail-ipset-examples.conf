# =============================================================================
# FAIL2BAN → IPSET CONFIGURATION EXAMPLES
# =============================================================================
# Choose ONE of the approaches below and add to /etc/fail2ban/jail.local
#
# Your current /etc/fail2ban/jail.local location: /etc/fail2ban/jail.local
# =============================================================================

# =============================================================================
# APPROACH 1: ALL BANNED IPs → PERMANENT BLACKLIST
# =============================================================================
# Every IP that gets banned goes straight to permanent blacklist
# PROS: Maximum security, attackers never come back
# CONS: No second chances, fills up blacklist faster
#
# CONFIGURATION:
# Edit /etc/fail2ban/jail.local and modify the [sshd] section:

[sshd]
enabled = true
port = ssh
logpath = %(sshd_log)s
backend = %(sshd_backend)s
maxretry = 3
bantime = 86400
findtime = 600
destemail = examplemail@gmail.com
sendername = Fail2ban-VPS
mta = mail
# Add both nftables (temporary) AND permanent blacklist actions:
action = %(action_)s
ipset-blacklist-permanent[name=sshd]
mail-buffered[name=sshd, dest="examplemail@gmail.com", sender="fail2ban@vmi"]

# =============================================================================
# APPROACH 2: REPEAT OFFENDERS ONLY → PERMANENT BLACKLIST (RECOMMENDED)
# =============================================================================
# First ban: temporary (24h via nftables)
# Second+ ban: PERMANENT (added to blacklist-permanent ipset)
# PROS: Gives benefit of doubt, smart filtering
# CONS: Slightly more complex, requires fail2ban database
#
# CONFIGURATION:
# Edit /etc/fail2ban/jail.local and modify the [sshd] section:

[sshd]
enabled = true
port = ssh
logpath = %(sshd_log)s
backend = %(sshd_backend)s
maxretry = 3
bantime = 86400
findtime = 600
destemail = examplemail@gmail.com
sendername = Fail2ban-VPS
mta = mail
# Add nftables, repeat-offender detector, and email:
action = %(action_)s
ipset-repeat-offender[name=sshd, repeat_threshold=2, destemail="examplemail@gmail.com"]
mail-buffered[name=sshd, dest="examplemail@gmail.com", sender="fail2ban@vmi"]

# =============================================================================
# APPROACH 3: HYBRID - SEPARATE JAILS (ADVANCED)
# =============================================================================
# Two jails: one for temp bans, one for permanent
# Most flexible but requires more configuration
#
# Add this to /etc/fail2ban/jail.local:

[sshd-temp]
enabled = true
port = ssh
logpath = %(sshd_log)s
backend = %(sshd_backend)s
maxretry = 5
bantime = 3600 # 1 hour temporary
findtime = 600
action = %(action_)s

[sshd-permanent]
enabled = true
port = ssh
logpath = %(sshd_log)s
backend = %(sshd_backend)s
maxretry = 2 # Stricter: only 2 tries
bantime = -1 # Permanent
findtime = 86400 # 24h window
action = ipset-blacklist-permanent[name=sshd-permanent]
mail-buffered[name=sshd-permanent, dest="examplemail@gmail.com", sender="fail2ban@vmi"]

# =============================================================================
# MY RECOMMENDATION FOR YOU: APPROACH 2 (Repeat Offenders)
# =============================================================================
# Why? It's the best balance:
# - Forgives innocent mistakes (wrong password, typos)
# - Permanently blocks persistent attackers
# - Keeps your blacklist clean and meaningful
# - Email notifications when someone becomes permanent
#
# =============================================================================
